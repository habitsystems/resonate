<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Resonate — Harp Grid</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <style>
    :root {
      --cell-size: 24px; /* fallback; JS will update */
      --cols: 10;
      --rows: 10;
      --col-width: 24px;
      --row-height: 24px;
      --bg: #111;
    }
    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      overflow: hidden;
      touch-action: none; /* allow smooth multi-touch playing */
      -webkit-tap-highlight-color: transparent;
      color-scheme: dark;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, sans-serif;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(var(--cols), var(--col-width, var(--cell-size)));
      grid-auto-rows: var(--row-height, var(--cell-size));
      width: 100vw;
      height: 100vh;
      user-select: none;
      cursor: pointer;
    }
    /*noinspection CssUnusedSymbol*/
    .cell {
      width: var(--col-width, var(--cell-size));
      height: var(--row-height, var(--cell-size));
      /* color set inline via style attribute */
      transition: transform 60ms ease, filter 120ms ease;
      outline: none;
      border: none;
      padding: 0;
      margin: 0;
    }
    /*noinspection CssUnusedSymbol*/
    .cell:active { transform: scale(0.96); }
    /*noinspection CssUnusedSymbol*/
    .cell.playing { filter: brightness(1.2) saturate(1.15); }
    .controls {
      position: fixed;
      left: 8px; top: 8px;
      font-size: 14px;
      background: rgba(0,0,0,0.35);
      padding: 8px 12px; border-radius: 6px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
      z-index: 10;
    }
    .controls label { cursor: pointer; }
    .controls input { cursor: pointer; }
  </style>
</head>
<body>
  <div class="controls">
    <input type="checkbox" id="chaos-toggle" checked>
    <label for="chaos-toggle">Chaos</label>
  </div>
  <div id="grid" class="grid" aria-label="Harp grid"></div>
  <script src="./index.js" type="module"></script>
</body>
</html>
